<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Página não encontrada | Odonto Oriente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #100D0B;
      color: #F5F0E6;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .wrap { max-width: 480px; }
    .num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 300;
      line-height: 1;
      color: #C9A961;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 300;
      margin-bottom: 14px;
    }
    p { font-size: 15px; color: rgba(245,240,230,.65); margin-bottom: 36px; line-height: 1.75; }
    a {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg,#C9A961,#E8D4A0);
      color: #0A0807;
      padding: 16px 36px;
      border-radius: 4px;
      font-size: 12px; font-weight: 500;
      letter-spacing: 2.5px; text-transform: uppercase;
      text-decoration: none;
      transition: transform .3s, box-shadow .3s;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(201,169,97,.35); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você procura não existe ou foi movida.<br>Você será redirecionado para a home em instantes.</p>
    <a href="/">← Voltar ao início</a>
  </div>
</body>
</html>
